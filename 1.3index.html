: ["对", "错"], "answer": "B", "explanation": "", "image": ""}, {"id": 549, "chapter": "齿轮传动", "type": "判断题", "question": "两直齿圆柱齿轮啮合线为一斜线，啮合时啮合线由短变长，退出时啮合线由长变短。", "options": ["对", "错"], "answer": "B", "explanation": "", "image": ""}, {"id": 550, "chapter": "齿轮传动", "type": "判断题", "question": "直齿锥齿轮不产生根切的最少齿数比直齿圆柱齿轮的更多。", "options": ["对", "错"], "answer": "B", "explanation": "", "image": ""}, {"id": 551, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "在轴连接中能够起到周向和轴向定位的是( )。", "options": ["套筒", "轴肩", "挡环", "紧定螺钉"], "answer": "D", "explanation": "紧定螺钉既能实现周向定位又能实现轴向定位。轴肩只能轴向定位；套筒也主要用于轴向定位；挡环用于轴向固定。"}, {"id": 552, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "淬火后的工件，经高温回火后，淬火应力可以完全消除，具有良好的综合力学性能。高温回火的温度范围是（ ）。", "options": ["500~650℃", "600~750℃", "250~450℃", "550~700℃"], "answer": "A", "explanation": "高温回火的温度范围是500~650℃。250~450℃为中温回火，低温回火为150~250℃。"}, {"id": 553, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "力偶对物体产生的运动效应为( )。", "options": ["只能使物体转动", "只能使物体移动", "既能使物体转动，又能使物体移动", "它与力对物体产生的运动效应有时相同，有时不同"], "answer": "A", "explanation": "力偶只能使物体转动，不能产生移动效应。力偶在任意坐标轴上的投影之和为零，因此没有合力。"}, {"id": 554, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "在径向滑动轴承中，采用可倾瓦的目的在于（ ）。", "options": ["便于装配", "使轴承具有自动调位能力", "提高轴承的稳定性", "增加润滑油流量，降低温升"], "answer": "C", "explanation": "可倾瓦的主要目的是提高轴承的稳定性。可倾瓦能够自动适应轴颈的位置变化，从而抑制油膜振荡。"}, {"id": 555, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "机器中各运动单元称为（ ）。", "options": ["零件", "部件", "机件", "构件"], "answer": "D", "explanation": "构件是机器的运动单元体，而零件是机器的制造单元体。"}, {"id": 556, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "液压传动中，常用的工作介质是（ ），系统用它来传递（ ）。", "options": ["活塞、压力", "液压油、压力", "活塞、运动", "液压油、运动"], "answer": "D", "explanation": "液压传动以液压油为工作介质，通过液压油传递运动。"}, {"id": 557, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "标准直齿轮不根切的最小齿数为（ ）。", "options": ["14", "15", "16", "17"], "answer": "D", "explanation": "正常标准渐开线直齿圆柱齿轮不产生根切的最少齿数为17。"}, {"id": 558, "chapter": "模拟试卷25-26-2", "type": "单选题", "question": "实心圆轴的直径增大一倍，则最大扭转切应力（ ）。", "options": ["增加为原来的16倍", "增加为原来的8倍", "下降为原来的1/16", "下降为原来的1/8"], "answer": "D", "explanation": "实心圆轴最大扭转切应力τmax=T/Wt，Wt∝d³。d增大一倍，Wt增大为原来的8倍，τmax下降为原来的1/8。"}, {"id": 559, "chapter": "模拟试卷25-26-2", "type": "多选题", "question": "轴系支点的轴向固定结构形式有三类（ ）。", "options": ["两端固定", "一端固定、一端游动", "两端游动", "两端浮动"], "answer": "ABC", "explanation": "轴系支点轴向固定的三种结构形式为：两端固定、一端固定一端游动、两端游动。"}, {"id": 560, "chapter": "模拟试卷25-26-2", "type": "多选题", "question": "根据力的作用线是否共面，可以分为（ ）（ ）。", "options": ["平行力系", "平面力系", "空间力系", "汇交平行力系"], "answer": "BC", "explanation": "根据力的作用线是否在同一平面内，可分为平面力系和空间力系两大类。"}, {"id": 561, "chapter": "模拟试卷25-26-2", "type": "多选题", "question": "轮系的功用有（ ）。", "options": ["运动合成", "运动分解", "变速", "变向"], "answer": "ABCD", "explanation": "轮系可以实现：运动合成、运动分解、变速、变向等多种功能。"}, {"id": 562, "chapter": "模拟试卷25-26-2", "type": "多选题", "question": "属于平键有（ ）。", "options": ["普通平键", "导向键", "花键", "滑键"], "answer": "ABD", "explanation": "普通平键、导向键、滑键都属于平键。花键是独立的一类连接。"}, {"id": 563, "chapter": "模拟试卷25-26-2", "type": "判断题", "question": "铰链四杆机构中有2个曲柄的就是双曲柄机构。", "options": ["对", "错"], "answer": "A", "explanation": "√ 正确。有两个连架杆都是曲柄的铰链四杆机构称为双曲柄机构。"}, {"id": 564, "chapter": "模拟试卷25-26-2", "type": "判断题", "question": "平键联接工作时，是靠键和键槽侧面的挤压传递转矩的。", "options": ["对", "错"], "answer": "A", "explanation": "√ 正确。平键的工作面是两侧面，靠侧面挤压传递转矩。"}, {"id": 565, "chapter": "模拟试卷25-26-2", "type": "判断题", "question": "当梁的材料是钢时，一般选用工字形的截面形状；若是铸铁，一般采用T形的截面形状。", "options": ["对", "错"], "answer": "A", "explanation": "√ 正确。钢材抗拉抗压能力相当，用工字形截面；铸铁抗压不抗拉，用T形截面使受拉区域小。"}, {"id": 566, "chapter": "模拟试卷25-26-2", "type": "判断题", "question": "为了节省成本，换带时只需更换不能使用的传动带即可。", "options": ["对", "错"], "answer": "B", "explanation": "× 错误。更换传动带时应成套更换，不能只换一根。"}, {"id": 567, "chapter": "模拟试卷25-26-2", "type": "判断题", "question": "对非分离型轴承的内圈从紧配合轴上拆卸时，较多使用拉拔器工具。", "options": ["对", "错"], "answer": "A", "explanation": "√ 正确。拆卸紧配合轴承内圈时应使用拉拔器（拉马/拔轮器），避免直接敲击。"}, {"id": 568, "chapter": "模拟试卷25-26-2", "type": "判断题", "question": "齿轮毛坯制造方法有铸造和锻造。", "options": ["对", "错"], "answer": "A", "explanation": "√ 正确。齿轮毛坯常用铸造和锻造两种方法制造。"}, {"id": 569, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "常见汽油的牌号有哪些，数字表示什么含义？（简答题）", "options": [], "answer": "92号、95号、98号等|数字表示汽油的辛烷值，辛烷值越高，抗爆震性能越好", "explanation": "常见汽油牌号：92号、95号、98号。数字代表辛烷值（RON），反映汽油的抗爆震性能，数值越高抗爆性越好。"}, {"id": 570, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "写出普通平键链接的装配顺序。（简答题）", "options": [], "answer": "清洁键槽→将键装入轴槽中→对准轮毂键槽→将轮毂推入|安装后检查键的侧面间隙和顶面间隙", "explanation": "平键装配顺序：1.清洁轴和轮毂的键槽；2.将键轻敲入轴槽中；3.对准轮毂键槽，将轮毂推入轴上；4.检查键与键槽的配合是否正确。"}, {"id": 571, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "简述键连接的类型及应用特点。（简答题）", "options": [], "answer": "平键连接：用于一般轴毂连接，靠侧面传递扭矩|半圆键连接：可摆动，用于锥形轴|楔键连接：靠摩擦力传递扭矩，用于低速|花键连接：承载能力强，导向性好，用于汽车变速箱", "explanation": "键连接类型：1.平键连接—最常用，靠侧面挤压传力；2.半圆键连接—可在键槽中摆动，适用于锥形轴；3.楔键连接—靠上下表面摩擦力传力，适用于低速；4.花键连接—承载大、导向性好，广泛应用于汽车变速器。"}, {"id": 572, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "离合器主要由那几部分组成？（简答题）", "options": [], "answer": "主动部分|从动部分|压紧机构|操纵机构|分离机构", "explanation": "离合器主要由五部分组成：主动部分、从动部分、压紧机构、操纵机构和分离机构。"}, {"id": 573, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "有一对正常齿制的标准直齿圆柱齿轮，大齿轮遗失，小齿轮数Z1=30，m=2.5mm，两齿轮的传动比为1.8，试求大轮的模数m和齿数Z2。（计算题）", "options": [], "answer": "m=2.5mm|Z2=54", "explanation": "解：标准齿轮传动中，两齿轮模数相同，所以m=2.5mm。由传动比公式 i12=Z2/Z1=1.8，得Z2=1.8×30=54。"}, {"id": 574, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "求杆件在截面1-1处所受的内力是多少？见材料力学基础第42题图。（计算题）", "options": [], "answer": "-5KN", "explanation": "拉力为正，压力为负，截面1-1处受压力，内力为-5KN。", "image": "https://raw.githubusercontent.com/1145225/idn/main/2.材料力学基础作业/第四十二题.png"}, {"id": 575, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "某机械制造企业发现齿轮长时间使用后经常出现磨损、断裂等失效现象。如何解决？（资料题）", "options": [], "answer": "提高齿轮材料强度|优化齿轮热处理工艺|改善润滑条件|定期检查和更换", "explanation": "解决措施：1.选用更好材料或进行表面强化处理（渗碳、渗氮）；2.改善热处理工艺；3.保证润滑条件（选择合适的润滑油）；4.避免过载使用；5.定期检修更换。"}, {"id": 576, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "画出下列各球体的受力图。各接触处都是光滑的。（资料题）", "options": [], "answer": "画出球体受重力G和光滑接触面的法向反力N|光滑接触面反力沿接触面法线方向", "explanation": "光滑球体受力分析：受重力G（竖直向下），光滑接触面的法向约束反力N（垂直于接触面指向球心）。"}, {"id": 577, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "连线题：将液压元件与功能连线。①换向阀 ②蓄能器 ③液压泵 → A.储存压力油 B.控制液压油流动方向 C.将机械能转换为液压能", "options": [], "answer": "1-B|2-A|3-C", "explanation": "换向阀→控制液压油的流动方向(B)；蓄能器→储存压力油，稳定系统压力(A)；液压泵→将机械能转换为液压能(C)。"}, {"id": 578, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "连线题：将公差配合术语与解释连线。①间隙配合 ②过盈配合 ③过渡配合 → A.孔的公差带完全在轴的公差带之上 B.孔和轴的公差带相互交叠 C.孔的公差带完全在轴的公差带之下", "options": [], "answer": "1-A|2-C|3-B", "explanation": "间隙配合→孔的公差带完全在轴的公差带之上(A)；过盈配合→孔的公差带完全在轴的公差带之下(C)；过渡配合→孔和轴的公差带相互交叠(B)。"}, {"id": 579, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "连线题：将机械零件与用途连线。①滚动轴承 ②弹簧 ③螺栓 ④齿轮 ⑤密封圈 → A.可拆卸连接 B.密封防泄漏 C.储存释放能量起缓冲 D.传递运动和动力 E.支撑旋转轴减摩擦", "options": [], "answer": "1-E|2-C|3-A|4-D|5-B", "explanation": "滚动轴承→支撑旋转轴并减少摩擦(E)；弹簧→储存和释放能量(C)；螺栓→可拆卸连接(A)；齿轮→传递运动和动力(D)；密封圈→密封防止泄漏(B)。"}, {"id": 580, "chapter": "模拟试卷25-26-2", "type": "填空题", "question": "连线题：把传动方式与特点连线。①带传动 ②链传动 ③齿轮传动 → A.传动比准确效率高 B.结构简单缓冲吸振 C.适合恶劣环境传动比准确", "options": [], "answer": "1-B|2-C|3-A", "explanation": "带传动→结构简单，能缓冲吸振(B)；链传动→能在恶劣环境工作，传动比准确(C)；齿轮传动→传动比准确，效率高(A)。"}];

// ========== 全局状态 ==========
var state = {pending:[],currentIdx:0,answered:{},wrongQids:new Set(),correctCount:0,wrongCount:0,done:false,locked:false,mode:'all'};
var CHAPTERS=[];
(function(){var s={};QUESTIONS.forEach(function(q){if(!s[q.chapter]){s[q.chapter]=true;CHAPTERS.push(q.chapter);}});})();

// ========== localStorage 持久化 ==========
var STORAGE_KEY = 'mech_quiz_580_v1';

function saveToStorage() {
  try {
    var data = {
      wrongQids: Array.from(state.wrongQids),
      correctCount: state.correctCount,
      wrongCount: state.wrongCount,
      mode: state.mode,
      answered: state.answered,
      time: Date.now()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    var dot = document.getElementById('saveDot');
    if (dot) { dot.classList.add('show'); setTimeout(function(){ dot.classList.remove('show'); }, 1500); }
  } catch(e) {}
}

function loadFromStorage() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
}

// ========== 工具函数 ==========
function shuffle(a){var i=a.length,j,t;while(i){j=Math.floor(Math.random()*i--);t=a[i];a[i]=a[j];a[j]=t;}return a;}

// ========== 核心逻辑 ==========
function initState(mode) {
  state.mode = mode || 'all';
  var ids;
  if (mode === 'wrong') {
    ids = Array.from(state.wrongQids);
    if (ids.length === 0) { ids = QUESTIONS.map(function(q) { return q.id; }); state.mode = 'all'; }
  } else {
    ids = QUESTIONS.map(function(q) { return q.id; });
  }
  // 排除已答对的题目
  if (mode === 'all') {
    ids = ids.filter(function(id) { return state.answered[id] !== 'correct'; });
  }
  state.pending = shuffle(ids);
  state.currentIdx = 0;
  state.correctCount = 0;
  state.wrongCount = 0;
  state.answered = {};
  state.done = false;
  state.locked = false;
  updateSidebar();
  saveToStorage();
}

function getQ(){if(state.done||state.currentIdx>=state.pending.length)return null;return QUESTIONS.find(function(q){return q.id===state.pending[state.currentIdx];});}

function updateSidebar(){
  var done=state.correctCount+state.wrongCount;
  document.getElementById('sCorrect').textContent=state.correctCount;
  document.getElementById('sWrong').textContent=state.wrongCount;
  document.getElementById('sDone').textContent=done;
  document.getElementById('sLeft').textContent=state.pending.length-state.currentIdx;
  document.getElementById('progressFill').style.width=(done/QUESTIONS.length*100)+'%';
  var btn=document.getElementById('btnWrong'),wc=state.wrongQids.size;
  btn.textContent='\u{1f501} 刷错题（'+wc+'道）';btn.disabled=wc===0;
  var chStats={};CHAPTERS.forEach(function(ch){chStats[ch]={wrong:0};});
  QUESTIONS.forEach(function(q){if(state.wrongQids.has(q.id))chStats[q.chapter].wrong++;});
  var sorted=Object.entries(chStats).sort(function(a,b){return b[1].wrong-a[1].wrong;});
  var h='';sorted.forEach(function(e){var ch=e[0],s=e[1],cls=s.wrong>0?'high-wrong':'low-wrong',bd=s.wrong>0?'<span class="badge badge-red">'+s.wrong+'错</span>':'<span class="badge badge-green">0</span>';h+='<div class="chapter-item '+cls+'"><span>'+ch+'</span>'+bd+'</div>';});
  document.getElementById('chapterStats').innerHTML=h;
  document.getElementById('headerInfo').textContent=state.mode==='wrong'?'\u{1f4cc} 刷错题模式':'';
}

function render(){
  updateSidebar();var card=document.getElementById('questionCard'),q=getQ();
  if(!q){showComplete(card);return;}
  var tc=q.type==='单选题'?'type-single':q.type==='多选题'?'type-multi':q.type==='判断题'?'type-judge':'type-fill';
  var retry=state.answered[q.id]==='wrong'?'<span class="wrong-tag">\u274c 之前答错，再试一次</span>':'';
  var img=q.image?'<div class="q-image"><img src="'+q.image+'" alt="配图" onerror="this.style.display=\'none\'" /></div>':'';
  var ah='';
  if(q.type==='填空题'){ah='<div><input type="text" class="fill-input" id="fillInput" placeholder="请输入答案" /><button class="btn-next-btn fill-btn" style="padding:8px 20px;font-size:13px;" onclick="submitFill()">提交答案</button></div>';}
  else if(q.type==='多选题'){ah='<div class="options">'+q.options.map(function(o,i){return '<div class="opt" data-idx="'+i+'" onclick="toggleMulti(this,'+i+')"><span class="letter">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></div>';}).join('')+'</div><button class="btn-next-btn" style="padding:10px 24px;font-size:13px;" onclick="submitMulti('+q.id+')">提交答案</button>';}
  else{ah='<div class="options">'+q.options.map(function(o,i){return '<div class="opt" data-idx="'+i+'" onclick="selectOne(this,'+q.id+')"><span class="letter">'+String.fromCharCode(65+i)+'</span><span>'+o+'</span></div>';}).join('')+'</div>';}
  card.innerHTML='<div class="q-meta"><span class="q-type '+tc+'">'+q.type+'</span><span class="q-chapter">'+q.chapter+' \u00b7 第'+q.id+'题</span>'+retry+'</div><div class="q-text">'+q.question+'</div>'+img+ah+'<div class="explanation" id="explanation"></div><div class="btn-row" id="btnRow" style="display:none;"><button class="btn-next-btn" onclick="nextQuestion()">下一题 \u2192</button></div>';
  state.locked=false;
}

function selectOne(el,qId){
  if(state.locked)return;state.locked=true;
  var q=QUESTIONS.find(function(x){return x.id===qId;});
  var idx=parseInt(el.dataset.idx),sel=String.fromCharCode(65+idx),ok=sel===q.answer;
  var os=document.querySelectorAll('.opt');for(var i=0;i<os.length;i++)os[i].classList.add('locked');
  var ci=q.answer.charCodeAt(0)-65;if(os[ci])os[ci].classList.add('correct');
  if(!ok)el.classList.add('wrong');
  showResult(ok,q,sel);
}

var mp=new Set();
function toggleMulti(el,idx){if(state.locked)return;if(mp.has(idx)){mp.delete(idx);el.classList.remove('picked');}else{mp.add(idx);el.classList.add('picked');}}

function submitMulti(qId){
  if(state.locked||mp.size===0)return;state.locked=true;
  var q=QUESTIONS.find(function(x){return x.id===qId;});
  var sel=Array.from(mp).sort().map(function(i){return String.fromCharCode(65+i);}).join(''),ok=sel===q.answer;
  var os=document.querySelectorAll('.opt');for(var i=0;i<os.length;i++)os[i].classList.add('locked');
  q.answer.split('').forEach(function(l){var ci=l.charCodeAt(0)-65;if(os[ci])os[ci].classList.add('correct');});
  Array.from(mp).forEach(function(i){var l=String.fromCharCode(65+i);if(q.answer.indexOf(l)===-1&&os[i])os[i].classList.add('wrong');});
  showResult(ok,q,sel);mp=new Set();
}

function submitFill(){
  if(state.locked)return;var inp=document.getElementById('fillInput');if(!inp||!inp.value.trim())return;state.locked=true;
  var q=getQ();if(!q)return;
  var ui=inp.value.trim(),up=ui.split(/[\uff1b;]/).map(function(s){return s.trim();}).filter(Boolean);
  var ap=q.answer.split('|').map(function(s){return s.trim();}).filter(Boolean);
  var ok=false;
  if(up.length===ap.length&&ap.length>0){ok=up.every(function(u,i){return u===ap[i]||ap[i].includes(u)||u.includes(ap[i]);});}
  if(!ok&&q.answer===ui)ok=true;
  showResult(ok,q,ui);
}

function showResult(ok,q,ua){
  var d=document.getElementById('explanation');d.className='explanation show '+(ok?'exp-correct':'exp-wrong');
  if(ok){d.innerHTML='<div class="exp-title">\u2705 回答正确！</div>'+(q.explanation?'<div style="margin-top:4px;">'+q.explanation+'</div>':'');}
  else{d.innerHTML='<div class="exp-title">\u274c 回答错误！正确答案是 <b>'+q.answer+'</b></div>'+(q.explanation?'<div style="margin-top:4px;">'+q.explanation+'</div>':'');}
  document.getElementById('btnRow').style.display='flex';
  if(ok){state.answered[q.id]='correct';state.correctCount++;state.wrongQids.delete(q.id);state.pending.splice(state.currentIdx,1);}
  else{state.answered[q.id]='wrong';state.wrongCount++;state.wrongQids.add(q.id);var wi=state.pending[state.currentIdx];state.pending.splice(state.currentIdx,1);var off=3+Math.floor(Math.random()*4);state.pending.splice(Math.min(state.currentIdx+off,state.pending.length),0,wi);}
  updateSidebar();
  saveToStorage();
}

function nextQuestion(){if(state.currentIdx<state.pending.length){render();}else{showComplete(document.getElementById('questionCard'));saveToStorage();}}

function showComplete(card){
  state.done=true;var wl=QUESTIONS.filter(function(q){return state.wrongQids.has(q.id);});
  var wh='';if(wl.length>0){wh='<div style="text-align:left;margin-top:18px;"><h3 style="color:#c62828;margin-bottom:10px;">\u274c 还需巩固（'+wl.length+'道）：</h3>'+wl.map(function(q){return '<div style="padding:7px 10px;background:#fff3e0;border-left:3px solid #ff9800;border-radius:4px;margin-bottom:4px;font-size:12px;">['+q.chapter+'] '+q.question.substring(0,45)+'\u2026 \u2192 '+q.answer+'</div>';}).join('')+'</div>';}
  card.innerHTML='<div class="complete"><div class="icon">\ud83c\udf89</div><h2>'+(state.mode==='wrong'?'错题刷完！':'全部刷完！')+'</h2><p>\u2705 正确 '+state.correctCount+' 题 | \u274c 错误 '+state.wrongCount+' 题</p>'+wh+'<div class="btn-row">'+(wl.length>0?'<button class="btn btn-wrong" style="flex:none;padding:13px 28px;" onclick="reviewWrong()">\u{1f501} 刷错题（'+wl.length+'道）</button>':'')+'<button class="btn btn-reset" style="flex:none;padding:13px 28px;" onclick="resetAll()">\u{1f504} 全部重刷（清除进度）</button></div></div>';
  updateSidebar();
  saveToStorage();
}

function reviewWrong(){if(state.wrongQids.size===0)return;initState('wrong');render();}
function resetAll(){clearStorage();initState('all');render();}
function toggleSidebar(){var s=document.getElementById('sidebar');s.classList.toggle('open');}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&!state.locked){var inp=document.getElementById('fillInput');if(inp&&inp.value.trim())submitFill();}});

// ========== 启动：尝试恢复进度 ==========
var saved = loadFromStorage();
if (saved && saved.wrongQids && saved.wrongQids.length > 0) {
  state.wrongQids = new Set(saved.wrongQids);
  state.correctCount = saved.correctCount || 0;
  state.wrongCount = saved.wrongCount || 0;
  state.mode = saved.mode || 'all';
  state.answered = saved.answered || {};
  var ids;
  if (state.mode === 'wrong') {
    ids = Array.from(state.wrongQids);
  } else {
    ids = QUESTIONS.map(function(q) { return q.id; });
    ids = ids.filter(function(id) { return state.answered[id] !== 'correct'; });
  }
  state.pending = shuffle(ids);
  state.currentIdx = 0;
  state.done = false;
  state.locked = false;
} else {
  initState('all');
}
render();
</script>
</body>
</html>
